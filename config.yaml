# Configuración de Voooxly. Cárgala con config.load_config().
# Los valores de entorno (.env) tienen prioridad sobre lo de aquí.

# --- STT (speech to text) — whisper.cpp ---
stt:
  # whisper.cpp usa un modelo ggml .bin. Se busca automáticamente en
  # ~/.voooxly/models/ggml-large-v3-turbo-q5_0.bin (o -turbo / -large-v3 / -medium).
  # El q5_0 cuantizado (~550MB) es el recomendado: en Macs de 8GB no se pagina.
  # Sobreescribe con la ruta que quieras vía env VOOOXLY_STT_MODEL_FILE.
  model: "ggml-large-v3-turbo"
  # Diccionario personal: nombres propios, marcas y jerga que Whisper suele
  # escribir mal. Se pasan como "initial prompt" y sesgan la transcripción
  # hacia estas grafías exactas. Añade los tuyos.
  dictionary: []
  server_port: 8080       # puerto del whisper-server local
  threads: 4              # hilos CPU para el decoder
  language: "auto"        # "auto" = idioma del sistema. Forzar un idioma ahorra
                          # ~1.4s/petición frente a que Whisper lo detecte solo;
                          # null = detección automática. Fija "es"/"en"/… si
                          # dictas en un idioma distinto al de tu Mac.
                          # El modo Traducir EN→ES fuerza "en" por su cuenta.
  sample_rate: 16000      # Whisper quiere 16kHz mono
  partial_interval: 2.0   # segundos entre transcripciones del buffer (overlay en vivo)
  partial_window: 5.0     # ventana corta = parciales rápidos que no encolan la final
                          # (el whisper-server procesa en serie)
  keepalive_min: 4        # ping cada N min para mantener el modelo en RAM y evitar
                          # el arranque frío de 10-19s tras inactividad (0 = off)
  transcribe_timeout_floor: 30    # mínimo del timeout de /inference: un dictado
                                  # corto contra un server encallado tiene que
                                  # seguir fallando rápido. El timeout real crece
                                  # con la duración del audio (ver stt.py) — esto
                                  # es solo el piso.
  transcribe_timeout_ceiling: 180 # techo duro del timeout aunque el audio sea
                                  # larguísimo: un server colgado no puede dejar
                                  # la app esperando sin fin. A los 300s de
                                  # audio.max_duration el cálculo da 150s, así
                                  # que en la práctica no debería activarse.

# --- Audio / VAD ---
audio:
  device: null            # null = dispositivo por defecto. Índice int o nombre.
  vad_aggressiveness: 2   # 0-3 (webrtcvad). 2 = buen balance.
  silence_to_stop: 1.2    # segundos de silencio para auto-cerrar la grabación
  max_duration: 300       # seguridad: cierra a los 5 min aunque no haya silencio.
                          # No bajar a 60: anula el latch, que existe para los
                          # dictados largos, y se pierde todo lo posterior.
  min_duration: 0.4       # descarta pulsaciones de menos de 0.4s
  min_rms: 50             # RMS int16 mínimo: por debajo = micro sin señal (TCC
                          # denegado o mute) y se descarta sin llamar a Whisper
  pause_media: true       # pausa Spotify/Music al dictar y los reanuda al soltar
                          # (solo si estaban sonando; pide Automatización 1ª vez)

# --- Hotkeys (pynput key strings) ---
hotkeys:
  # Modo del botón de dictado:
  #   "hold"   = push-to-talk: mantén pulsado para hablar, suelta para terminar (estilo Wispr)
  #   "toggle" = pulsa para empezar, pulsa/te callas para terminar
  toggle_mode: "hold"
  # Tecla de dictado. En modo "hold" debe ser UNA tecla (p.ej. "cmd_r", "alt_r", "f6").
  # El menú (Settings → Dictation key) solo ofrece los seis modificadores de la
  # fila de abajo; cualquier otra tecla válida se pone aquí a mano.
  #
  # EVITA F5: en un Mac es la tecla de Dictado del sistema. Al pulsarla macOS
  # cambia la fuente de entrada e invalida la caché de TIS/TSM, y hasta la
  # versión actual eso mataba el proceso con SIGTRAP (HIToolbox exige el hilo
  # principal para reconstruir esa lista, y pynput la tocaba desde el hilo de
  # su listener). Ya no crashea — hotkey._warm_input_sources y no rearrancar el
  # listener lo cierran — pero sigue siendo mala elección: macOS se queda el
  # evento para su propio dictado. Igual con otras teclas con función de
  # sistema.
  toggle: ["cmd_r"]
  # Cambiar al modo siguiente
  cycle_mode: ["ctrl","shift","m"]
  # Pegar manualmente el último resultado (si auto_paste está apagado)
  paste_last: ["ctrl","shift","v"]
  # Cancelar el dictado en curso (grabando o procesando): descarta todo,
  # no se pega nada. UNA tecla.
  cancel: ["esc"]
  # Latch (solo modo hold): si el dictado va para largo, pulsa esta tecla SIN
  # soltar la de dictado y la grabación queda fijada — puedes soltar. Un tap
  # de la tecla de dictado termina. Esc también lo deshace. UNA tecla.
  latch: ["shift"]

# --- Output ---
output:
  auto_paste: true        # true = simular Cmd+V en la app activa; false = solo portapapeles
  copy_to_clipboard: true

# --- Refinamiento LLM ---
llm:
  # Backend: "auto" | "ollama" | "claude" | "openai" | "none"
  # "auto" detecta en cascada: Ollama corriendo → ANTHROPIC_API_KEY →
  # OPENAI_API_KEY → none (pegar transcripción cruda, sin IA). Así cada
  # usuario conecta la IA que tenga sin tocar nada.
  backend: "auto"
  # Fast-lane: dictados de ≤N palabras en modos con fast_lane (Organize) se
  # pegan tal cual sin pasar por el LLM — Whisper ya puntúa bien frases cortas
  # y se ahorran 2-6s. 0 = desactivado.
  fast_lane_words: 9
  # Reglas personales que se añaden al prompt de TODOS los modos (menos
  # Verbatim). Ej: "Never use semicolons. My company is spelled Ucademy."
  custom_rules: ""
  # Ollama
  ollama:
    host: "http://localhost:11434"
    # Sin modelo de fábrica: fijar uno a fuego presupone cuál tiene instalado
    # el usuario (y si es ":cloud" exige una suscripción de Ollama que no todo
    # el mundo tiene — así fue como el default roto pasó desapercibido).
    # Se elige desde el menú AI engine → Ollama, que le pregunta a tu propio
    # servidor qué modelos tienes y te deja escoger el tuyo.
    model: ""
    temperature: 0.3
    timeout: 60             # si el LLM no responde a tiempo se pega la transcripción
                            # cruda. 60s, no 20: un dictado de 5 min es 5× más texto
                            # que refinar, y al vencer el usuario lo vive como "la IA
                            # dejó de funcionar en los dictados largos".
  # Claude API (si ANTHROPIC_API_KEY está en env)
  claude:
    model: "claude-sonnet-5"
    max_tokens: 4000
    timeout: 60
  # OpenAI-compatible (base_url + key)
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
    temperature: 0.3
    timeout: 60

# --- App ---
app:
  default_mode: "ordenar"
  language: null          # idioma de salida del refinador. null = conservar el
                          # idioma hablado (lo normal). Fíjalo solo si quieres
                          # que la salida sea siempre en un idioma concreto.
  save_history: true      # guarda cada dictado en ~/.voooxly/history.jsonl
                          # (0600, rota a 500 entradas) — alimenta Recent entre
                          # sesiones y "Search history…". false = solo en memoria.
  show_overlay: true      # HUD con transcripción en vivo
  overlay_position: "bottom-right"   # "bottom-right" | "top-right" | "center"
  sounds: true            # clic sutil al empezar/terminar de grabar (menú: Settings → Sounds)
  log_level: "INFO"