# Configuración de Dictador. Cárgala con config.load_config().
# Los valores de entorno (.env) tienen prioridad sobre lo de aquí.

# --- STT (speech to text) — whisper.cpp ---
stt:
  # whisper.cpp usa un modelo ggml .bin. Se busca automáticamente en
  # ~/.dictador/models/ggml-large-v3-turbo-q5_0.bin (o -turbo / -large-v3 / -medium).
  # El q5_0 cuantizado (~550MB) es el recomendado: en Macs de 8GB no se pagina.
  # Sobreescribe con la ruta que quieras vía env DICTADOR_STT_MODEL_FILE.
  model: "ggml-large-v3-turbo"
  # Diccionario personal: nombres propios, marcas y jerga que Whisper suele
  # escribir mal. Se pasan como "initial prompt" y sesgan la transcripción
  # hacia estas grafías exactas. Añade los tuyos.
  dictionary: ["Voxly", "Ucademy", "Eduardo Crovetto"]
  server_port: 8080       # puerto del whisper-server local
  threads: 4              # hilos CPU para el decoder
  language: "es"          # forzar idioma ahorra ~1.4s/petición vs auto-detección.
                          # El modo Traducir EN→ES fuerza "en" por su cuenta.
  sample_rate: 16000      # Whisper quiere 16kHz mono
  partial_interval: 2.0   # segundos entre transcripciones del buffer (overlay en vivo)
  partial_window: 5.0     # ventana corta = parciales rápidos que no encolan la final
                          # (el whisper-server procesa en serie)
  keepalive_min: 4        # ping cada N min para mantener el modelo en RAM y evitar
                          # el arranque frío de 10-19s tras inactividad (0 = off)

# --- Audio / VAD ---
audio:
  device: null            # null = dispositivo por defecto. Índice int o nombre.
  vad_aggressiveness: 2   # 0-3 (webrtcvad). 2 = buen balance.
  silence_to_stop: 1.2    # segundos de silencio para auto-cerrar la grabación
  max_duration: 60        # seguridad: cierra a los 60s aunque no haya silencio
  min_duration: 0.4       # descarta pulsaciones de menos de 0.4s
  min_rms: 50             # RMS int16 mínimo: por debajo = micro sin señal (TCC
                          # denegado o mute) y se descarta sin llamar a Whisper

# --- Hotkeys (pynput key strings) ---
hotkeys:
  # Modo del botón de dictado:
  #   "hold"   = push-to-talk: mantén pulsado para hablar, suelta para terminar (estilo Wispr)
  #   "toggle" = pulsa para empezar, pulsa/te callas para terminar
  toggle_mode: "hold"
  # Tecla de dictado. En modo "hold" debe ser UNA tecla (p.ej. "cmd_r", "alt_r", "f6").
  # Evita F5 (macOS lo roba para Siri) y otras teclas con función del sistema.
  toggle: ["cmd_r"]
  # Cambiar al modo siguiente
  cycle_mode: ["ctrl","shift","m"]
  # Pegar manualmente el último resultado (si auto_paste está apagado)
  paste_last: ["ctrl","shift","v"]

# --- Output ---
output:
  auto_paste: true        # true = simular Cmd+V en la app activa; false = solo portapapeles
  copy_to_clipboard: true

# --- Refinamiento LLM ---
llm:
  # Backend: "auto" | "ollama" | "claude" | "openai" | "none"
  # "auto" detecta en cascada: Ollama corriendo → ANTHROPIC_API_KEY →
  # OPENAI_API_KEY → none (pegar transcripción cruda, sin IA). Así cada
  # usuario conecta la IA que tenga sin tocar nada.
  backend: "auto"
  # Fast-lane: dictados de ≤N palabras en modos con fast_lane (Organize) se
  # pegan tal cual sin pasar por el LLM — Whisper ya puntúa bien frases cortas
  # y se ahorran 2-6s. 0 = desactivado.
  fast_lane_words: 9
  # Ollama
  ollama:
    host: "http://localhost:11434"
    model: "glm-5.2:cloud"
    temperature: 0.3
    timeout: 20             # si el LLM no responde a tiempo se pega la transcripción cruda
  # Claude API (si ANTHROPIC_API_KEY está en env)
  claude:
    model: "claude-sonnet-5"
    max_tokens: 1200
    timeout: 60
  # OpenAI-compatible (base_url + key)
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
    temperature: 0.3
    timeout: 60

# --- App ---
app:
  default_mode: "ordenar"
  language: "es"          # idioma de salida del refinador
  show_overlay: true      # HUD con transcripción en vivo
  overlay_position: "bottom-right"   # "bottom-right" | "top-right" | "center"
  sounds: true            # clic sutil al empezar/terminar de grabar (menú: Settings → Sounds)
  log_level: "INFO"